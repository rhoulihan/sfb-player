<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="'Segoe UI', sans-serif">
  <!-- background -->
  <rect x="0" y="0" width="1280" height="800" fill="#ffffff"/>

  <!-- ============ APP HEADER ============ -->
  <rect x="24" y="24" width="1232" height="48" rx="8" fill="#334155"/>
