  <!-- Legend box -->
  <rect x="32" y="672" width="240" height="88" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="44" y="692" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.5">LEGEND</text>
  <rect x="44" y="700" width="14" height="14" rx="3" fill="#dbeafe" stroke="#2563eb"/>
