  <!-- C3 (expanded sub) -->
  <polygon points="60,286 68,286 64,292" fill="#475569"/>
  <text x="76" y="294" font-size="13" font-weight="600" fill="#475569">C3. Turn Modes</text>
  <!-- C3.1 -->
  <circle cx="88" cy="324" r="2.5" fill="#94a3b8"/>
  <text x="100" y="328" font-size="13" fill="#475569">C3.1 Turn Cost</text>
  <!-- C3.2 (selected) -->
  <rect x="32" y="341" width="240" height="28" rx="5" fill="#dbeafe"/>
  <rect x="32" y="341" width="4" height="28" rx="2" fill="#2563eb"/>
  <circle cx="88" cy="358" r="2.5" fill="#2563eb"/>
  <text x="100" y="362" font-size="13" font-weight="700" fill="#2563eb">C3.2 Turn Mode</text>
  <!-- C3.3 -->
  <circle cx="88" cy="392" r="2.5" fill="#94a3b8"/>
  <text x="100" y="396" font-size="13" fill="#475569">C3.3 Turn Mode Chart</text>
  <!-- C7 -->
  <circle cx="64" cy="426" r="2.5" fill="#94a3b8"/>
  <text x="76" y="430" font-size="13" fill="#475569">C7. Acceleration / Decel</text>

  <!-- D Combat -->
  <polygon points="40,455 40,463 46,459" fill="#64748b"/>
  <text x="56" y="464" font-size="13" fill="#334155">D. Combat</text>
  <!-- E Ship Operations -->
  <polygon points="40,489 40,497 46,493" fill="#64748b"/>
  <text x="56" y="498" font-size="13" fill="#334155">E. Ship Operations</text>
